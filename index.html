<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPRINT TIMER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --lime: #C8FF00;
    --dark: #0a0a0a;
    --card: #141414;
    --muted: #333;
    --text: #f0f0f0;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  header {
    width: 100%;
    padding: 18px 20px 10px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    border-bottom: 1px solid var(--muted);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--lime);
  }

  header span {
    font-size: 0.65rem;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .camera-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
    background: #000;
    margin-top: 0;
  }

  #video {
    width: 100%;
    display: block;
  }

  /* Detection zone line */
  .detection-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 3px;
    background: var(--lime);
    opacity: 0.7;
    transform: translateX(-50%);
    transition: opacity 0.1s, box-shadow 0.1s;
    pointer-events: none;
  }
  .detection-line.triggered {
    opacity: 1;
    box-shadow: 0 0 20px var(--lime), 0 0 60px var(--lime);
  }

  .line-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: var(--lime);
    background: rgba(0,0,0,0.6);
    padding: 2px 8px;
    white-space: nowrap;
    pointer-events: none;
  }

  /* Sensitivity slider overlay */
  .sens-overlay {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 20px;
  }
  .sens-overlay label {
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: #aaa;
    text-transform: uppercase;
  }
  #sensitivitySlider {
    -webkit-appearance: none;
    width: 90px;
    height: 3px;
    background: var(--muted);
    border-radius: 2px;
    outline: none;
  }
  #sensitivitySlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--lime);
    cursor: pointer;
  }
  #sensitivityVal {
    font-size: 0.6rem;
    color: var(--lime);
    min-width: 20px;
  }

  canvas { display: none; }

  /* Status + timer section */
  .info-panel {
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 0;
  }

  .state-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .dot.ready { background: #4af; animation: pulse-blue 1.5s ease-in-out infinite; }
  .dot.running { background: var(--lime); animation: pulse-lime 0.6s ease-in-out infinite; }
  .dot.done { background: #fff; }

  @keyframes pulse-lime {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,255,0,0.6); }
    50% { box-shadow: 0 0 0 8px rgba(200,255,0,0); }
  }
  @keyframes pulse-blue {
    0%, 100% { box-shadow: 0 0 0 0 rgba(68,170,255,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(68,170,255,0); }
  }

  #statusText {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #aaa;
    line-height: 1.4;
  }

  /* Big timer display */
  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5.5rem;
    letter-spacing: 4px;
    line-height: 1;
    color: var(--lime);
    margin-bottom: 4px;
    transition: color 0.3s;
    min-height: 90px;
  }
  .timer-display.idle { color: var(--muted); }
  .timer-display.done { color: #fff; }

  .timer-unit {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* History */
  .history-label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 4px;
  }

  #history {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  #history li {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #1e1e1e;
    padding-bottom: 6px;
  }

  #history li .run-label {
    font-size: 0.65rem;
    color: #555;
    letter-spacing: 1px;
  }

  #history li .run-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--text);
  }

  #history li.best .run-time { color: var(--lime); }
  #history li .run-badge {
    font-size: 0.55rem;
    background: var(--lime);
    color: #000;
    padding: 1px 5px;
    letter-spacing: 1px;
    border-radius: 2px;
    margin-left: 6px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
  }

  /* Buttons */
  .btn-row {
    width: 100%;
    max-width: 480px;
    padding: 0 20px 30px;
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--lime); color: #000; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--muted); }

  /* flash overlay */
  #flashOverlay {
    position: fixed; inset: 0;
    background: var(--lime);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.05s;
  }
</style>
</head>
<body>

<header>
  <h1>Sprint Timer</h1>
  <span>Kamera-Bewegungserkennung</span>
</header>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="detection-line" id="detectionLine"></div>
  <div class="line-label" id="lineLabel">ERKENNUNGSLINIE</div>
  <div class="sens-overlay">
    <label>Empfindlichkeit</label>
    <input type="range" id="sensitivitySlider" min="5" max="50" value="20">
    <span id="sensitivityVal">20</span>
  </div>
</div>

<div class="info-panel">
  <div class="state-row">
    <div class="dot" id="statusDot"></div>
    <div id="statusText">Kamera wird gestartet…</div>
  </div>

  <div class="timer-display idle" id="timerDisplay">00.000</div>
  <div class="timer-unit">Sekunden</div>

  <div class="history-label">Letzte Läufe</div>
  <ul id="history"></ul>
</div>

<div class="btn-row">
  <button class="btn btn-primary" id="resetBtn" onclick="resetTimer()">Reset</button>
  <button class="btn btn-secondary" id="manualBtn" onclick="manualTrigger()">Manuell</button>
</div>

<div id="flashOverlay"></div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const timerDisplay = document.getElementById('timerDisplay');
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');
  const detectionLine = document.getElementById('detectionLine');
  const lineLabel = document.getElementById('lineLabel');
  const historyList = document.getElementById('history');
  const sensitivitySlider = document.getElementById('sensitivitySlider');
  const sensitivityVal = document.getElementById('sensitivityVal');
  const flashOverlay = document.getElementById('flashOverlay');

  let state = 'waiting'; // waiting | running | cooldown
  let startTime = null;
  let timerInterval = null;
  let prevData = null;
  let runHistory = [];
  let animFrame = null;
  let cooldownTimeout = null;
  let sensitivity = 20;
  let wakeLock = null;

  // Verhindert, dass der Bildschirm ausgeht / der Bildschirmschoner startet
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) {
      console.log('Wake Lock nicht verfügbar:', e);
    }
  }

  document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  });

  sensitivitySlider.addEventListener('input', () => {
    sensitivity = parseInt(sensitivitySlider.value);
    sensitivityVal.textContent = sensitivity;
  });

  // Start camera
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        setStatus('ready', 'Bereit — Lauf durch die Linie!');
        startDetection();
        requestWakeLock();
      };
    } catch (e) {
      setStatus('idle', 'Kamerazugriff verweigert. Bitte Berechtigung erlauben.');
    }
  }

  function setStatus(type, msg) {
    statusText.textContent = msg;
    statusDot.className = 'dot ' + type;
  }

  // Motion detection on center stripe
  function detectMotion() {
    if (!video.videoWidth) return 0;

    const w = canvas.width;
    const h = canvas.height;
    // Sample a vertical stripe in the center (10% wide)
    const stripeW = Math.max(1, Math.floor(w * 0.10));
    const stripeX = Math.floor(w / 2 - stripeW / 2);

    ctx.drawImage(video, 0, 0, w, h);
    const frame = ctx.getImageData(stripeX, 0, stripeW, h);

    if (!prevData) {
      prevData = frame;
      return 0;
    }

    let diff = 0;
    const len = frame.data.length;
    for (let i = 0; i < len; i += 4) {
      diff += Math.abs(frame.data[i] - prevData.data[i])
             + Math.abs(frame.data[i+1] - prevData.data[i+1])
             + Math.abs(frame.data[i+2] - prevData.data[i+2]);
    }

    prevData = frame;
    const pixels = len / 4;
    return diff / pixels; // avg diff per pixel (0-765)
  }

  function startDetection() {
    function loop() {
      // Kamera-Vergleichsbild IMMER aktuell halten, auch während Cooldown —
      // sonst ist der Referenzframe nach der Pause veraltet und löst beim
      // Wiedereinstieg fälschlich sofort aus.
      const motion = detectMotion();

      if (state !== 'cooldown') {
        const threshold = sensitivity; // avg pixel diff threshold
        if (motion > threshold) {
          triggerDetection();
        }
      }

      animFrame = requestAnimationFrame(loop);
    }
    animFrame = requestAnimationFrame(loop);
  }

  function triggerDetection() {
    if (state === 'waiting') {
      // First pass — start timer
      state = 'running';
      startTime = performance.now();
      timerDisplay.className = 'timer-display';
      timerDisplay.textContent = '00.000';
      setStatus('running', 'Timer läuft — Lauf nochmal durch!');
      lineLabel.textContent = 'STOPP HIER LAUFEN';
      flashScreen();
      vibrate();

      timerInterval = setInterval(() => {
        const elapsed = performance.now() - startTime;
        timerDisplay.textContent = formatTime(elapsed);
      }, 16);

      enterCooldown(1800);

    } else if (state === 'running') {
      // Second pass — stop timer
      const elapsed = performance.now() - startTime;
      clearInterval(timerInterval);
      state = 'cooldown';

      timerDisplay.className = 'timer-display done';
      timerDisplay.textContent = formatTime(elapsed);
      setStatus('done', `Fertig! Zeit: ${formatTime(elapsed)}s`);
      lineLabel.textContent = 'ERKENNUNGSLINIE';
      flashScreen();
      vibrate();

      addToHistory(elapsed);
      enterCooldown(3000, () => { state = 'waiting'; setStatus('ready', 'Bereit — Lauf durch die Linie!'); });
    }
  }

  function enterCooldown(ms, callback) {
    state = 'cooldown';
    detectionLine.classList.add('triggered');
    clearTimeout(cooldownTimeout);
    cooldownTimeout = setTimeout(() => {
      detectionLine.classList.remove('triggered');
      if (callback) callback();
      else state = (startTime && timerInterval) ? 'running' : 'waiting';
    }, ms);
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const msPart = Math.floor(ms % 1000);
    return `${String(s).padStart(2, '0')}.${String(msPart).padStart(3, '0')}`;
  }

  function addToHistory(ms) {
    runHistory.unshift(ms);
    if (runHistory.length > 5) runHistory.pop();
    const best = Math.min(...runHistory);
    historyList.innerHTML = '';
    runHistory.forEach((t, i) => {
      const li = document.createElement('li');
      const isBest = t === best && runHistory.length > 1;
      if (isBest) li.className = 'best';
      li.innerHTML = `
        <span class="run-label">Lauf ${runHistory.length - i}</span>
        <span class="run-time">${formatTime(t)}s${isBest ? '<span class="run-badge">BEST</span>' : ''}</span>
      `;
      historyList.appendChild(li);
    });
  }

  function flashScreen() {
    flashOverlay.style.opacity = '0.35';
    setTimeout(() => { flashOverlay.style.opacity = '0'; }, 120);
  }

  function vibrate() {
    if (navigator.vibrate) navigator.vibrate([80]);
  }

  function resetTimer() {
    clearInterval(timerInterval);
    clearTimeout(cooldownTimeout);
    state = 'waiting';
    startTime = null;
    prevData = null;
    timerDisplay.className = 'timer-display idle';
    timerDisplay.textContent = '00.000';
    lineLabel.textContent = 'ERKENNUNGSLINIE';
    detectionLine.classList.remove('triggered');
    setStatus('ready', 'Bereit — Lauf durch die Linie!');
  }

  function manualTrigger() {
    if (state === 'cooldown') return;
    triggerDetection();
  }

  startCamera();
</script>
</body>
</html>
